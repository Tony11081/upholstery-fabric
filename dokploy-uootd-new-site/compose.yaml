name: upholsteryfabric-site

services:
  db:
    image: mariadb:11
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${WP_DB_NAME}
      MYSQL_USER: ${WP_DB_USER}
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - upholsteryfabric_db:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX}
      WORDPRESS_DEBUG: ${WP_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_HOME', '${WP_SITE_URL}' );
        define( 'WP_SITEURL', '${WP_SITE_URL}' );
        define( 'FS_METHOD', 'direct' );
        define( 'DISALLOW_FILE_EDIT', true );
        define( 'AUTOMATIC_UPDATER_DISABLED', true );
    volumes:
      - upholsteryfabric_wordpress:/var/www/html
      - ./template:/opt/uootd-template:ro
      - ./:/opt/uootd-site:ro
    restart: unless-stopped
    command:
      - bash
      - -lc
      - |
          set -eu
          mkdir -p /var/www/html/wp-content/mu-plugins
          mkdir -p /var/www/html/wp-content/uploads/uootd-generated

          cp /opt/uootd-template/uootd-000-shell-config.php /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-storefront-branding.php /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-storefront-branding.css /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-storefront-branding.js /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-storefront-parity.php /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-storefront-parity.css /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-checkout-branding.php /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-checkout-branding.css /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-checkout-branding.js /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-inflyway-gateway.php /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-template/uootd-inflyway-blocks.js /var/www/html/wp-content/mu-plugins/
          cp /opt/uootd-site/uootd-shell-config.local.php /var/www/html/wp-content/mu-plugins/uootd-shell-config.local.php
          cp /opt/uootd-template/uootd-generated/*-generated.png /var/www/html/wp-content/uploads/uootd-generated/

          exec apache2-foreground

  wp-setup:
    image: wordpress:cli-php8.2
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX}
      WP_SITE_URL: ${WP_SITE_URL}
      WP_SITE_TITLE: ${WP_SITE_TITLE}
      WP_TAGLINE: ${WP_TAGLINE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      TZ: ${TZ:-Asia/Shanghai}
      FABRICVIVA_CATALOG_PATH: /opt/uootd-site/catalog/fabricviva-catalog.json
    volumes:
      - upholsteryfabric_wordpress:/var/www/html
      - ./:/opt/uootd-site:ro
    restart: unless-stopped
    command:
      - sh
      - -lc
      - /opt/uootd-site/scripts/wp-init.sh && while true; do sleep 3600; done

volumes:
  upholsteryfabric_db:
  upholsteryfabric_wordpress:
